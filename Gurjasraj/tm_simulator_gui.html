<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turing Machine Simulator — COMP 382</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e17;
  --surface: #111827;
  --surface-2: #1a2235;
  --border: #2a3650;
  --text: #e2e8f0;
  --text-dim: #7a8ba8;
  --accent: #38bdf8;
  --accent-dim: #1e3a5f;
  --accept: #34d399;
  --accept-bg: #0d3025;
  --reject: #f87171;
  --reject-bg: #3b1515;
  --amber: #fbbf24;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
.container { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem; }
h1 { font-family: var(--mono); font-size: 1.1rem; font-weight: 500; color: var(--accent); letter-spacing: 0.02em; margin-bottom: 0.25rem; }
.subtitle { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 2rem; }
.controls { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 1.5rem; }
.control-group { display: flex; flex-direction: column; gap: 4px; }
.control-group label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--mono); }
select, input[type="text"] { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 0.8rem; padding: 8px 12px; border-radius: 6px; outline: none; }
select:focus, input:focus { border-color: var(--accent); }
select { cursor: pointer; min-width: 200px; }
input[type="text"] { width: 80px; }
.btn-group { display: flex; gap: 6px; }
button { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 0.75rem; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
button:hover { border-color: var(--accent); background: var(--accent-dim); }
button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--mono); margin-bottom: 4px; }
.stat-value { font-family: var(--mono); font-size: 1rem; font-weight: 500; }
.stat-value.state { color: var(--accent); }
.stat-value.status-running { color: var(--amber); }
.stat-value.status-accepted { color: var(--accept); }
.stat-value.status-rejected { color: var(--reject); }
.tape-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; }
.tape-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--mono); margin-bottom: 12px; }
.tape-wrapper { display: flex; justify-content: center; gap: 3px; overflow-x: auto; padding: 8px 0; }
.cell { width: 44px; height: 50px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 6px; font-family: var(--mono); font-size: 1.05rem; font-weight: 500; background: var(--surface-2); transition: all 0.25s ease; flex-shrink: 0; position: relative; }
.cell.head { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); box-shadow: 0 0 12px rgba(56,189,248,0.15); }
.cell.head::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 6px solid var(--accent); }
.cell.written { animation: cellFlash 0.4s ease; }
@keyframes cellFlash { 0%,100% { background: var(--surface-2); } 50% { background: #1a3a2a; } }
.head-indicator { text-align: center; margin-top: 16px; font-family: var(--mono); font-size: 0.7rem; color: var(--accent); }
.transition-display { text-align: center; font-family: var(--mono); font-size: 0.8rem; color: var(--text-dim); margin-top: 12px; padding: 8px; background: var(--surface-2); border-radius: 6px; min-height: 34px; display: flex; align-items: center; justify-content: center; }
.transition-display .arrow { color: var(--accent); margin: 0 8px; }
.trace-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; max-height: 220px; overflow-y: auto; }
.trace-section .tape-label { margin-bottom: 8px; }
.trace-entry { font-family: var(--mono); font-size: 0.72rem; line-height: 1.9; color: var(--text-dim); }
.trace-entry.accept { color: var(--accept); }
.trace-entry.reject { color: var(--reject); }
.output-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: none; }
.output-value { font-family: var(--mono); font-size: 1.8rem; font-weight: 600; letter-spacing: 0.05em; text-align: center; padding: 0.5rem 0; }
.output-value.accepted { color: var(--accept); }
.output-value.rejected { color: var(--reject); }
.speed-slider { display: flex; align-items: center; gap: 8px; }
.speed-slider input[type="range"] { -webkit-appearance: none; background: var(--surface-2); height: 4px; border-radius: 2px; outline: none; width: 80px; }
.speed-slider input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
.speed-val { font-family: var(--mono); font-size: 0.7rem; color: var(--text-dim); min-width: 20px; }
</style>
</head>
<body>
<div class="container">
  <h1>turing machine simulator</h1>
  <p class="subtitle">COMP 382 — Assignment 3 &middot; Universal TM execution engine</p>

  <div class="controls">
    <div class="control-group">
      <label>Program</label>
      <select id="tm-select">
        <option value="pi7">Pi calculator (n=7) → 3.1415926</option>
        <option value="pi4">Pi calculator (n=4) → 3.1415</option>
        <option value="pi1">Pi calculator (n=1) → 3.1</option>
        <option value="binc">Binary increment: 101 → 110</option>
        <option value="binc2">Binary increment: 111 → 1000</option>
        <option value="accept">Simple accept (input: 1)</option>
        <option value="reject">Simple reject (input: 0)</option>
      </select>
    </div>
    <div class="btn-group">
      <button id="btn-play" onclick="togglePlay()">&#9654; play</button>
      <button id="btn-step" onclick="doStep()">step</button>
      <button onclick="resetSim()">reset</button>
    </div>
    <div class="control-group">
      <label>Speed</label>
      <div class="speed-slider">
        <span class="speed-val">1x</span>
        <input type="range" min="1" max="10" value="4" id="speed" oninput="document.querySelector('.speed-val').textContent=this.value+'x'">
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">State</div><div class="stat-value state" id="s-state">qRead</div></div>
    <div class="stat"><div class="stat-label">Step</div><div class="stat-value" id="s-step">0</div></div>
    <div class="stat"><div class="stat-label">Head</div><div class="stat-value" id="s-head">0</div></div>
    <div class="stat"><div class="stat-label">Status</div><div class="stat-value status-running" id="s-status">running</div></div>
  </div>

  <div class="output-section" id="output-section">
    <div class="tape-label">Tape output</div>
    <div class="output-value" id="output-value"></div>
  </div>

  <div class="tape-section">
    <div class="tape-label">Tape</div>
    <div class="tape-wrapper" id="tape"></div>
    <div class="head-indicator">&#9650; head</div>
    <div class="transition-display" id="trans">select a program and press play</div>
  </div>

  <div class="trace-section" id="trace-box">
    <div class="tape-label">Execution trace</div>
    <div id="trace-log"></div>
  </div>
</div>

<script>
const TMS = {
  pi7: { input:"7", start:"qRead", accept:"qaccept", reject:"qreject", blank:"B",
    transitions:{"qRead,7":["qDot7","3","R"],"qRead,B":["qreject","B","R"],"qDot7,B":["qD1_to7",".","R"],"qD1_to7,B":["qD2_to7","1","R"],"qD2_to7,B":["qD3_to7","4","R"],"qD3_to7,B":["qD4_to7","1","R"],"qD4_to7,B":["qD5_to7","5","R"],"qD5_to7,B":["qD6_to7","9","R"],"qD6_to7,B":["qD7_done","2","R"],"qD7_done,B":["qaccept","6","R"]}},
  pi4: { input:"4", start:"qRead", accept:"qaccept", reject:"qreject", blank:"B",
    transitions:{"qRead,4":["qDot4","3","R"],"qRead,B":["qreject","B","R"],"qDot4,B":["qD1_to4",".","R"],"qD1_to4,B":["qD2_to4","1","R"],"qD2_to4,B":["qD3_to4","4","R"],"qD3_to4,B":["qD4_done","1","R"],"qD4_done,B":["qaccept","5","R"]}},
  pi1: { input:"1", start:"qRead", accept:"qaccept", reject:"qreject", blank:"B",
    transitions:{"qRead,1":["qDot1","3","R"],"qRead,B":["qreject","B","R"],"qDot1,B":["qD1_done",".","R"],"qD1_done,B":["qaccept","1","R"]}},
  binc: { input:"101", start:"qRight", accept:"qaccept", reject:"qreject", blank:"B",
    transitions:{"qRight,0":["qRight","0","R"],"qRight,1":["qRight","1","R"],"qRight,B":["qCarry","B","L"],"qCarry,1":["qCarry","0","L"],"qCarry,0":["qDone","1","L"],"qCarry,B":["qDone","1","R"],"qDone,0":["qDone","0","L"],"qDone,1":["qDone","1","L"],"qDone,B":["qaccept","B","R"]}},
  binc2: { input:"111", start:"qRight", accept:"qaccept", reject:"qreject", blank:"B",
    transitions:{"qRight,0":["qRight","0","R"],"qRight,1":["qRight","1","R"],"qRight,B":["qCarry","B","L"],"qCarry,1":["qCarry","0","L"],"qCarry,0":["qDone","1","L"],"qCarry,B":["qDone","1","R"],"qDone,0":["qDone","0","L"],"qDone,1":["qDone","1","L"],"qDone,B":["qaccept","B","R"]}},
  accept: { input:"1", start:"q0", accept:"qaccept", reject:"qreject", blank:"B",
    transitions:{"q0,1":["qaccept","1","R"],"q0,0":["qreject","0","R"],"q0,B":["qreject","B","R"]}},
  reject: { input:"0", start:"q0", accept:"qaccept", reject:"qreject", blank:"B",
    transitions:{"q0,1":["qaccept","1","R"],"q0,0":["qreject","0","R"],"q0,B":["qreject","B","R"]}}
};

let tape,head,state,steps,halted,accepted,playing,timer,tm;
const VIS=13;

function init(k){
  tm=TMS[k]; tape={}; for(let i=0;i<tm.input.length;i++) tape[i]=tm.input[i];
  head=0; state=tm.start; steps=0; halted=false; accepted=null; playing=false;
  if(timer)clearInterval(timer); timer=null;
  document.getElementById("btn-play").innerHTML="&#9654; play";
  document.getElementById("btn-play").classList.remove("active");
  document.getElementById("trace-log").innerHTML="";
  document.getElementById("output-section").style.display="none";
  document.getElementById("trans").textContent="press play or step to begin";
  render();
}

function rd(p){return tape[p]!==undefined?tape[p]:tm.blank;}

function render(){
  const el=document.getElementById("tape"); const lo=head-Math.floor(VIS/2);
  let h="";
  for(let i=lo;i<lo+VIS;i++){
    const s=rd(i), isH=i===head;
    h+='<div class="cell'+(isH?" head":"")+'">'+s+'</div>';
  }
  el.innerHTML=h;
  document.getElementById("s-state").textContent=state;
  document.getElementById("s-step").textContent=steps;
  document.getElementById("s-head").textContent=head;
  const stEl=document.getElementById("s-status");
  if(!halted){stEl.textContent="running";stEl.className="stat-value status-running";}
  else if(accepted){stEl.textContent="accepted";stEl.className="stat-value status-accepted";}
  else{stEl.textContent="rejected";stEl.className="stat-value status-rejected";}
}

function getTape(){
  const ks=Object.keys(tape).map(Number).filter(k=>tape[k]!==tm.blank);
  if(!ks.length)return""; const lo=Math.min(...ks),hi=Math.max(...ks);
  let s=""; for(let i=lo;i<=hi;i++) s+=rd(i); return s;
}

function doStep(){
  if(halted)return;
  if(state===tm.accept){halted=true;accepted=true;finish("ACCEPTED");return;}
  if(state===tm.reject){halted=true;accepted=false;finish("REJECTED");return;}
  const sym=rd(head), key=state+","+sym, act=tm.transitions[key];
  if(!act){halted=true;accepted=false;finish("REJECTED — no transition for ("+state+", "+sym+")");return;}
  const[ns,ws,dir]=act;
  const trStr="("+state+", "+sym+") → ("+ns+", "+ws+", "+dir+")";
  tape[head]=ws; state=ns; head+=dir==="R"?1:-1; steps++;
  document.getElementById("trans").innerHTML='<span style="color:var(--text)">'+trStr.replace("→",'</span><span class="arrow">→</span><span style="color:var(--text)">')+'</span>';
  log("Step "+steps+": "+trStr);
  render();
  if(state===tm.accept){halted=true;accepted=true;finish("ACCEPTED — tape: "+getTape());}
  else if(state===tm.reject){halted=true;accepted=false;finish("REJECTED");}
}

function finish(msg){
  log(msg); render();
  if(halted){
    const out=document.getElementById("output-section");
    const val=document.getElementById("output-value");
    out.style.display="block";
    val.textContent=getTape();
    val.className="output-value "+(accepted?"accepted":"rejected");
    if(playing)togglePlay();
  }
}

function log(msg){
  const d=document.createElement("div"); d.className="trace-entry";
  if(msg.includes("ACCEPTED"))d.className+=" accept";
  if(msg.includes("REJECTED"))d.className+=" reject";
  d.textContent=msg; document.getElementById("trace-log").appendChild(d);
  document.getElementById("trace-box").scrollTop=99999;
}

function togglePlay(){
  if(halted&&!playing)return;
  playing=!playing;
  const btn=document.getElementById("btn-play");
  if(playing){btn.innerHTML="&#9646;&#9646; pause";btn.classList.add("active");
    const sp=document.getElementById("speed").value;
    const delay=Math.max(40,550-sp*50);
    timer=setInterval(()=>{if(halted){togglePlay();return;}doStep();},delay);
  }else{btn.innerHTML="&#9654; play";btn.classList.remove("active");clearInterval(timer);timer=null;}
}

function resetSim(){init(document.getElementById("tm-select").value);}
document.getElementById("tm-select").addEventListener("change",()=>resetSim());
init("pi7");
</script>
</body>
</html>
